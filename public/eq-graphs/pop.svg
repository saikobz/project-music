  <text x="84" y="30" fill="#22D3EE" font-size="24" font-weight="800">POP EQ PROFILE</text>
  <text x="84" y="52" fill="#A5F3FC" font-size="14">Vocal Presence + Air</text>

  <g fill="#94A3B8" font-size="12">
