    fill="none"
    stroke="url(#line-pop)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow-pop)"
  />

  <circle cx="530" cy="132" r="7" fill="#22D3EE" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="980" cy="122" r="7" fill="#22D3EE" stroke="#E2E8F0" stroke-width="1.5"/>

  <text x="548" y="122" fill="#E2E8F0" font-size="14" font-weight="700">1.5kHz +4.0dB</text>
