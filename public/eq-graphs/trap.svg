  <text x="84" y="30" fill="#F87171" font-size="24" font-weight="800">TRAP EQ PROFILE</text>
  <text x="84" y="52" fill="#FECACA" font-size="14">Sub Weight + Snap</text>

  <g fill="#F87171" font-size="12">
