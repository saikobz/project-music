    <line x1="500" y1="72" x2="500" y2="320"/>
    <line x1="610" y1="72" x2="610" y2="320"/>
    <line x1="720" y1="72" x2="720" y2="320"/>
    <line x1="830" y1="72" x2="830" y2="320"/>
    <line x1="1040" y1="72" x2="1040" y2="320"/>
  </g>

  <line x1="80" y1="180" x2="1080" y2="180" stroke="#FCA5A5" stroke-opacity="0.65" stroke-dasharray="6 6"/>

  <polyline
    points="80,126 170,110 260,138 350,186 440,214 530,222 620,210 710,194 800,170 890,146 980,130 1070,162"
    fill="none"
    stroke="url(#line-trap)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow-trap)"
  />

  <circle cx="80" cy="126" r="7" fill="#EF4444" stroke="#FECACA" stroke-width="1.5"/>
  <circle cx="830" cy="146" r="7" fill="#EF4444" stroke="#FECACA" stroke-width="1.5"/>

  <text x="98" y="116" fill="#FECACA" font-size="14" font-weight="700">60Hz +5.0dB</text>
