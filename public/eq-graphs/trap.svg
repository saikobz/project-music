<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-trap" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#180609"/>
      <stop offset="1" stop-color="#2C0D13"/>
    </linearGradient>
    <linearGradient id="line-trap" x1="60" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F87171" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
    <filter id="glow-trap" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="420" fill="url(#bg-trap)"/>
  <rect x="42" y="44" width="1116" height="332" rx="16" fill="#17070C" stroke="#7F1D1D" stroke-opacity="0.62"/>

  <g stroke="#7F1D1D" stroke-opacity="0.4">
    <line x1="80" y1="84" x2="1080" y2="84"/>
    <line x1="80" y1="132" x2="1080" y2="132"/>
    <line x1="80" y1="180" x2="1080" y2="180"/>
    <line x1="80" y1="228" x2="1080" y2="228"/>
    <line x1="80" y1="276" x2="1080" y2="276"/>
  </g>

  <g stroke="#7F1D1D" stroke-opacity="0.3">
