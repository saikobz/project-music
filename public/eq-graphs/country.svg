  <text x="84" y="30" fill="#FACC15" font-size="24" font-weight="800">COUNTRY EQ PROFILE</text>
  <text x="84" y="52" fill="#FDE68A" font-size="14">Body + Clarity</text>

  <g fill="#FDE68A" font-size="12">
