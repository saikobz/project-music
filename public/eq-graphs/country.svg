    <line x1="610" y1="72" x2="610" y2="320"/>
    <line x1="720" y1="72" x2="720" y2="320"/>
    <line x1="830" y1="72" x2="830" y2="320"/>
    <line x1="1040" y1="72" x2="1040" y2="320"/>
