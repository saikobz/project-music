<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-country" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1506"/>
      <stop offset="1" stop-color="#2A220C"/>
    </linearGradient>
    <linearGradient id="line-country" x1="60" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="glow-country" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="420" fill="url(#bg-country)"/>
  <rect x="42" y="44" width="1116" height="332" rx="16" fill="#171307" stroke="#854D0E" stroke-opacity="0.6"/>

  <g stroke="#854D0E" stroke-opacity="0.4">
    <line x1="80" y1="84" x2="1080" y2="84"/>
