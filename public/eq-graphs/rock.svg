    fill="none"
    stroke="url(#line-rock)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow-rock)"
  />

  <circle cx="170" cy="182" r="7" fill="#F97316" stroke="#FDE68A" stroke-width="1.5"/>
  <circle cx="800" cy="150" r="7" fill="#F97316" stroke="#FDE68A" stroke-width="1.5"/>

  <text x="188" y="172" fill="#FDE68A" font-size="14" font-weight="700">120Hz +3.5dB</text>
