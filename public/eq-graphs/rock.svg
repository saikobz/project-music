<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-rock" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#130A07"/>
      <stop offset="1" stop-color="#2A1710"/>
    </linearGradient>
    <linearGradient id="line-rock" x1="60" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB923C" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="glow-rock" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="420" fill="url(#bg-rock)"/>
  <rect x="42" y="44" width="1116" height="332" rx="16" fill="#180E09" stroke="#7C2D12" stroke-opacity="0.6"/>

  <g stroke="#78350F" stroke-opacity="0.4">
    <line x1="80" y1="84" x2="1080" y2="84"/>
    <line x1="80" y1="132" x2="1080" y2="132"/>
    <line x1="80" y1="180" x2="1080" y2="180"/>
    <line x1="80" y1="228" x2="1080" y2="228"/>
    <line x1="80" y1="276" x2="1080" y2="276"/>
  </g>

  <g stroke="#78350F" stroke-opacity="0.3">
    <line x1="80" y1="72" x2="80" y2="320"/>
    <line x1="170" y1="72" x2="170" y2="320"/>
    <line x1="280" y1="72" x2="280" y2="320"/>
    <line x1="390" y1="72" x2="390" y2="320"/>
    <line x1="500" y1="72" x2="500" y2="320"/>
    <line x1="610" y1="72" x2="610" y2="320"/>
    <line x1="720" y1="72" x2="720" y2="320"/>
    <line x1="830" y1="72" x2="830" y2="320"/>
    <line x1="1040" y1="72" x2="1040" y2="320"/>
  </g>

  <line x1="80" y1="180" x2="1080" y2="180" stroke="#FDBA74" stroke-opacity="0.65" stroke-dasharray="6 6"/>

  <polyline
