  <text x="84" y="30" fill="#FB923C" font-size="24" font-weight="800">ROCK EQ PROFILE</text>
  <text x="84" y="52" fill="#FED7AA" font-size="14">Low Punch + Presence</text>

  <g fill="#C2410C" font-size="12">
    <text x="18" y="88">+6dB</text>
    <text x="18" y="136">+3dB</text>
    <text x="26" y="184">0dB</text>
