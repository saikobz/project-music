<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-soul" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061610"/>
      <stop offset="1" stop-color="#0D2A1F"/>
    </linearGradient>
    <linearGradient id="line-soul" x1="60" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#86EFAC" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="glow-soul" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="420" fill="url(#bg-soul)"/>
  <rect x="42" y="44" width="1116" height="332" rx="16" fill="#071A13" stroke="#065F46" stroke-opacity="0.62"/>

